# Model
arch: convnext_small
drop_path_rate: 0.4
device: 'gpu'
layer_scale_init_value: 1e-6
layer_decay: 1.0
head_init_scale: 1.0
compile_mode: 'default'

# Optimizer & LR scheme
max_duration: '100ep'
batch_size: 256
opt: 'sgd'
lr: 0.1
lr_scheduler: 'cosineannealinglrwithwarmup'
lr_warmup_duration: '5ep'
momentum: 0.9
weight_decay: 1e-4


# Data
data_path: './data/imagenet/'
workers: 10
pin_memory: True
train_samples: 0
seed: 0

# Resizing
val_resize_size: 256
val_crop_size: 224
train_crop_size: 224

# Misc
disable_progress_bar: False
lr_monitor: False
log_interval: "1ba"

# Logging
eval_interval: '1ep'
save_dir: './outputs/'
run_name: convnext_small_imagenet_full-v1

