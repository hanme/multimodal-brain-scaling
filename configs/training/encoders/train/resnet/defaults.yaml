# Model
device: 'gpu'
compile_mode: 'default'
training_mode: 'scratch'

# Optimizer & LR scheme
max_epochs: 100
batch_size_image: 512
batch_size_neural: 256
opt: 'adamw'
lr_encoder: 1e-3
lr_decoder: 1e-3
min_lr: 1e-5
lr_scheduler: 'cosineannealinglrwarmup'
lr_warmup_duration: 5
opt_betas: [0.9, 0.999]
opt_eps: 1e-8
momentum: 0.9
combined_loader_mode_train: 'max_size_cycle'


# Data
data_path_image: './data/imagenet/'
workers: 16
pin_memory: True
train_samples: 0
seed: 0

# Resizing
val_resize_size: 256
val_crop_size: 224
train_crop_size: 224

# Misc
disable_progress_bar: False
lr_monitor: False
log_interval: 1

# Logging
eval_interval: 1

