base_config: defaults.yaml

# Model
arch: convnext_small
drop_path_rate: 0.4

decoders:
  IT:
    decoder_label: 'IT'
    feature_label: 'IT_feats'
    output_dim: 298
    hidden_dim: 512
    num_hidden_layers: 0
    loss: 'mse'
    is_frozen: False
  neural_behavior:
    decoder_label: 'neural_behavior'
    feature_label: 'neural_behavior_feats'
    output_dim: 1854
    hidden_dim: 512
    num_hidden_layers: 0
    loss: 'cross_entropy'
    is_frozen: False
num_classes_neural: 1854

# Loss weights
loss_weights:
  image: 1e-1
  neural_behavior: 0
  neural_response: 1e2